name: Deploy Pipeline
on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: ./dev-ops/DeployReady/app

      - name: Run tests
        run: npm test
        working-directory: ./dev-ops/DeployReady/app

  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase Repository Name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./dev-ops/DeployReady
          push: true
          tags: ghcr.io/${{ env.REPO }}/app:${{ github.sha }},ghcr.io/${{ env.REPO }}/app:latest

  deploy:
    name: Deploy
    needs: build
    # Look at this magic: We tell GitHub to use YOUR server instead of theirs!
    runs-on: self-hosted
    steps:
      - name: Deploy Container
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="ghcr.io/$REPO/app:${{ github.sha }}"
          
          # Since this script is running directly on the EC2 server, 
          # we just run the Docker commands natively!
          docker rm -f kora-app || true
          docker pull $IMAGE_TAG
          docker run -d --name kora-app -p 80:3000 -e PORT=3000 $IMAGE_TAG