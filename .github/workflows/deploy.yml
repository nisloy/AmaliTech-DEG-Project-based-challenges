name: Deploy Pipeline
on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: ./dev-ops/DeployReady/app

      - name: Run tests
        run: npm test
        working-directory: ./dev-ops/DeployReady/app

  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase Repository Name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./dev-ops/DeployReady
          push: true
          tags: ghcr.io/${{ env.REPO }}/app:${{ github.sha }},ghcr.io/${{ env.REPO }}/app:latest

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: GITHUB_REPOSITORY, GITHUB_SHA
          script: |
            REPO=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
            IMAGE_TAG="ghcr.io/$REPO/app:$GITHUB_SHA"
            
            # 1. Stop and remove the old container if it exists
            docker rm -f kora-app || true
            
            # 2. Pull the newly built image from GitHub
            docker pull $IMAGE_TAG
            
            # 3. Run the new container, mapping host port 80 to container port 3000
            docker run -d --name kora-app -p 80:3000 -e PORT=3000 $IMAGE_TAG