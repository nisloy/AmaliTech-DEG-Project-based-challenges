version: "3.8"

networks:
  watchtower_network:
    driver: bridge

services:
  order-service:
    build: ./order-service
    container_name: ${ORDER_SERVICE_NAME:-order-service}
    ports:
      - "${ORDER_SERVICE_PORT:-3001}:${ORDER_SERVICE_PORT:-3001}"
    environment:
      - PORT=${ORDER_SERVICE_PORT:-3001}
    networks:
      - watchtower_network

  tracking-service:
    build: ./tracking-service
    container_name: ${TRACKING_SERVICE_NAME:-tracking-service}
    ports:
      - "${TRACKING_SERVICE_PORT:-3002}:${TRACKING_SERVICE_PORT:-3002}"
    environment:
      - PORT=${TRACKING_SERVICE_PORT:-3002}
    networks:
      - watchtower_network

  notification-service:
    build: ./notification-service
    container_name: ${NOTIFICATION_SERVICE_NAME:-notification-service}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3003}:${NOTIFICATION_SERVICE_PORT:-3003}"
    environment:
      - PORT=${NOTIFICATION_SERVICE_PORT:-3003}
    networks:
      - watchtower_network

  prometheus:
    image: prom/prometheus:latest # fetch latest docker image for Prometheus
    container_name: prometheus
    ports:
      - "9090:9090" # expose Prometheus on port 9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - watchtower_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000" # expose Grafana on port 3000
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    networks:
      - watchtower_network