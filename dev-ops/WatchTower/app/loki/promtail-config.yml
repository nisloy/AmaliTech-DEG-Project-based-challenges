server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # This grabs the container name from Docker and sets it as the "instance" label (e.g., "order-service")
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'instance'
      # This explicitly adds job="dockerlogs" so your existing Grafana dashboard JSON works perfectly without any edits!
      - target_label: 'job'
        replacement: 'dockerlogs'